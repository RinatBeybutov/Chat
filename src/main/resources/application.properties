spring.application.name=demo
#Datasource configuration
#spring.datasource.url=jdbc:postgresql://localhost/webMvc
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.profiles.active=test

spring.datasource.url=jdbc:postgresql://localhost:5432/webMvc
spring.datasource.jdbcUrl=${spring.datasource.url}
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=validate
#spring.sql.init.schema-locations=classpath*:db/schema.sql
#spring.sql.init.data-locations=classpath*:db/data.sql

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE
#Flyway configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

flyway.user=postgres
flyway.password=postgres
flyway.schemas=public

flyway.url=jdbc:postgresql://localhost:5432/webMvc
flyway.locations=filesystem:db/migration
spring.sql.init.schema-locations=classpath*:db/schema.sql
spring.sql.init.data-locations=classpath*:db/data.sql

