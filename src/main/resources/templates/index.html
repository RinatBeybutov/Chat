<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Чат</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Основные стили */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            max-width: 500px;
            width: 100%;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .messages {
            height: 400px;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 10px;
        }

        .username {
            font-weight: bold;
            margin-right: 5px;
        }

        .input-container {
            padding: 10px;
            display: flex;
            align-items: center;
            border-top: 1px solid #eaeaea;
        }

        #messageInput {
            flex-grow: 1;
            padding: 12px 20px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        .save-comment {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .save-comment:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="messages" id="messages">
        <div th:each="message : ${messages}" class="message">
            <span class="username" th:text="${message.userName}">User</span>:
            <span th:text="${message.text}">Hello!</span>
        </div>
    </div>
    <form class="input-container" th:action="@{/}" method="post">
        <input type="text" id="messageInput" name="newComment" required>
        <input class="save-comment" type="submit" value="Отправить"/>
    </form>
</div>

</body>
</html>
